<!DOCTYPE html>
<html>

<head>
    <title>VS IP Address</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            min-height:100vh;

            background:
                linear-gradient(
                    135deg,
                    #0f0c29,
                    #302b63,
                    #24243e
                );

            color:white;
        }

        h2{
            font-size:32px;
            margin-bottom:25px;
            text-shadow:0 0 10px rgba(255,255,255,0.3);
        }

        textarea{

            width:85%;
            height:400px;

            padding:15px;

            font-size:18px;

            border-radius:15px;

            border:1px solid rgba(255,255,255,0.2);

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            color:white;

            outline:none;

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            resize:none;
        }

        textarea::placeholder{
            color:#cccccc;
        }

        button{

            padding:12px 25px;

            font-size:16px;

            margin-top:10px;

            border:none;

            border-radius:10px;

            background:
                linear-gradient(
                    135deg,
                    #00c6ff,
                    #0072ff
                );

            color:white;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

            box-shadow:0 0 15px rgba(0,114,255,0.5);
        }

        button:hover{

            transform:scale(1.05);

            box-shadow:0 0 25px rgba(0,114,255,0.8);
        }

    </style>
</head>

<body>

<h2>VS IP Page</h2>

<textarea id="note"
placeholder="Write your secure notes here..."></textarea>

<br><br>

<button id="saveBtn"
        onclick="saveNote()"
        style="display:none;">
    Save Note
</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

// Firebase Config

const firebaseConfig = {

  apiKey: "AIzaSyCsgQ4ujpzL7mabkjJCb3kTrGkm5u3JPT8",

  authDomain:
  "mynoteswebsite-4bb56.firebaseapp.com",

  projectId:
  "mynoteswebsite-4bb56",

  storageBucket:
  "mynoteswebsite-4bb56.firebasestorage.app",

  messagingSenderId:
  "909118327256",

  appId:
  "1:909118327256:web:442fbb8616449148a88aad",

  measurementId:
  "G-2KVKKPCBNH"
};

// Initialize Firebase

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

// Firebase Auth Check

onAuthStateChanged(auth, (user) => {

    if (!user) {

        window.location.href =
        "index.html";
    }
});

// Auto Logout After 1 Minute

setTimeout(async () => {

    alert("Session Expired!");

    await signOut(auth);

    window.location.href =
    "index.html";

},60000);

// Save Note

window.saveNote = async function () {

    const noteText =
    document.getElementById("note").value;

    await setDoc(
        doc(db, "notes", "mainNote"),
        {
            content: noteText
        }
    );

    alert("Note Saved Online!");
};

// Load Note

async function loadNote() {

    const docRef =
    doc(db, "notes", "mainNote");

    const docSnap =
    await getDoc(docRef);

    if (docSnap.exists()) {

        document.getElementById("note").value =
        docSnap.data().content;
    }
}

loadNote();

// Ctrl + K to Show/Hide Save Button

document.addEventListener("keydown", function(event){

    if(event.ctrlKey &&
       event.key.toLowerCase() === "k"){

        event.preventDefault();

        const btn =
        document.getElementById("saveBtn");

        if(btn.style.display === "none"){

            btn.style.display = "inline-block";

        }else{

            btn.style.display = "none";
        }
    }
});

</script>

</body>
</html>
