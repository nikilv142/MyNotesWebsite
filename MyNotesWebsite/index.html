<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.login-box{
    width:350px;
    padding:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    text-align:center;
    color:#ffffff;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    border:1px solid rgba(255,255,255,0.3);
}

.login-box h2{
    margin-bottom:25px;
    color:#ffffff;
    text-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:15px;
    background:rgba(255,255,255,0.9);
    color:#004d4d;
}

input::placeholder{
    color:#008b8b;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#00FFFF;
    color:#004d4d;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#7FFFD4;
    box-shadow:0 0 15px rgba(0,255,255,0.6);
}

.footer{
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
    color:white;
    text-shadow:0 2px 5px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="login-box">

    <h2>🔐 VS IP Address Login</h2>

    <input type="email"
           id="username"
           placeholder="Email">

    <input type="password"
           id="password"
           placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <div class="footer">
        Welcome ⚡
    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

// Firebase Config

const firebaseConfig = {

  apiKey: "AIzaSyCsgQ4ujpzL7mabkjJCb3kTrGkm5u3JPT8",

  authDomain:
  "mynoteswebsite-4bb56.firebaseapp.com",

  projectId:
  "mynoteswebsite-4bb56",

  storageBucket:
  "mynoteswebsite-4bb56.firebasestorage.app",

  messagingSenderId:
  "909118327256",

  appId:
  "1:909118327256:web:442fbb8616449148a88aad",

  measurementId:
  "G-2KVKKPCBNH"
};

// Initialize Firebase

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

// Login Function

window.login = async function(){

    let email =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        localStorage.setItem(
            "isLoggedIn",
            "true"
        );

        localStorage.setItem(
            "loginTime",
            Date.now()
        );

        window.location.href =
        "notes.html";

    }catch(error){

        alert(
            "Invalid Email or Password"
        );
    }
}

</script>

</body>
</html>
